# ── Webhook Dispatcher ────────────────────────────────────────────────────────
# Adicione estes blocos dentro do server {} do seu nginx.conf
# Substitui as rotas /webhook/tallos e /webhook/tallospj que apontavam
# diretamente para os bots.

# Webhook geral (todas as mensagens do RD Conversas)
location /webhook/tallos {
    proxy_pass         http://127.0.0.1:8000/webhook/tallos;
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 30s;
}

# Registro de lead PJ (chamado pelas automações do RD Conversas)
location /webhook/tallospj {
    proxy_pass         http://127.0.0.1:8000/webhook/tallospj;
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_read_timeout 30s;
}

# Registro de lead MBA (chamado pelas automações do RD Conversas)
location /webhook/tallosmba {
    proxy_pass         http://127.0.0.1:8000/webhook/tallosmba;
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_read_timeout 30s;
}

# Health check do dispatcher
location /webhook/health {
    proxy_pass         http://127.0.0.1:8000/health;
    proxy_http_version 1.1;
    proxy_read_timeout 5s;
}
